
services:
  app-api:
    container_name: app-api
    volumes:
      - ${API_PROJECT_FOLDER}:/var/www/html
    build:
      context: .
      dockerfile: Dockerfile
    image: linux-apache-sqlsvr-php:latest
    ports:
      - ${API_HTTP_PORT}:80
      - ${API_HTTPS_PORT}:443
      - ${API_WS_PORT}:6001
    networks:
      - app-network

  app-frontend:
    container_name: app-frontend
    volumes:
      - ${FRONTEND_PROJECT_FOLDER}:/var/www/html
      - /var/www/html/node_modules
    build:
      context: .
      dockerfile: Frontend.Dockerfile
      target: ${FRONTEND_APP_ENV}
      args:
        - PROJECT_PATH: ${FRONTEND_PROJECT_FOLDER}
      
    ports:
      - ${FRONTEND_PORT}:80
    networks:
      - app-network

  app-redis:
    container_name: app-redis
    image: redis:latest
    volumes:
      - /redis-data:/data
    ports:
      - 6379:6379
    networks:
      - app-network

networks:
  app-network:
    driver|: bridge
